<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | ZEParts Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar: #1a1a2e;
            --sidebar-muted: #9ca3af;
            --accent: #ff6b35;
            --background: #f4f6fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --border: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --active: #22c55e;
            --ended: #6b7280;
            --error: #ef4444;
            --pending: #f59e0b;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: linear-gradient(180deg, #eef2ff 0%, var(--background) 24%, #eef3f8 100%);
            color: var(--text);
        }

        .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: linear-gradient(180deg, #1a1a2e 0%, #141427 100%);
            color: #fff;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .brand {
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand-title {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--accent);
        }

        .brand-subtitle {
            margin: 6px 0 0;
            color: #d1d5db;
            font-size: 0.95rem;
        }

        .nav-label {
            margin: 0 0 10px;
            color: var(--sidebar-muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav a {
            color: #f9fafb;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .nav a:hover,
        .nav a:focus-visible {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateX(2px);
            outline: none;
        }

        .nav a.active {
            background: rgba(255, 107, 53, 0.18);
            border-color: rgba(255, 107, 53, 0.32);
        }

        .sidebar-note {
            margin-top: auto;
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            line-height: 1.6;
            font-size: 0.92rem;
        }

        .main {
            padding: 26px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: var(--shadow);
            border-radius: 22px;
            padding: 22px 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        .page-title {
            margin: 0;
            font-size: clamp(1.6rem, 2vw, 2.2rem);
            line-height: 1.1;
            letter-spacing: -0.04em;
        }

        .page-subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel,
        .card,
        .stat-card {
            background: var(--surface);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 22px;
            box-shadow: var(--shadow);
        }

        .panel {
            padding: 24px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .panel-title {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .panel-subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .stat-card {
            padding: 22px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        }

        .stat-label {
            margin: 0;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .stat-value {
            margin: 12px 0 0;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        tbody tr:hover {
            background: #fbfdff;
        }

        .mono {
            font-family: "SFMono-Regular", "Menlo", monospace;
            font-size: 0.92rem;
        }

        .muted {
            color: var(--muted);
        }

        .empty-state {
            padding: 40px 24px;
            text-align: center;
            color: var(--muted);
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border: 1px dashed #d1d5db;
            border-radius: 20px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .detail-item {
            padding: 18px;
            border-radius: 18px;
            background: var(--surface-soft);
            border: 1px solid var(--border);
        }

        .detail-label {
            margin: 0 0 8px;
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .detail-value {
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .button,
        button {
            appearance: none;
            border: none;
            border-radius: 14px;
            padding: 11px 16px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover,
        .button:focus-visible,
        button:hover,
        button:focus-visible {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
            outline: none;
        }

        .button-primary {
            background: var(--accent);
            color: #fff;
        }

        .button-secondary {
            background: #eef2ff;
            color: #1f2937;
        }

        .button-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: capitalize;
            line-height: 1;
        }

        .badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: currentColor;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.12);
            color: var(--active);
        }

        .badge-ended {
            background: rgba(107, 114, 128, 0.12);
            color: var(--ended);
        }

        .badge-error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--error);
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.14);
            color: var(--pending);
        }

        .success-true,
        .success-false {
            font-size: 1.1rem;
        }

        .success-true {
            color: var(--active);
        }

        .success-false {
            color: var(--error);
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                gap: 20px;
            }

            .stats-grid,
            .details-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .main {
                padding: 16px;
            }

            .topbar,
            .panel,
            .stat-card {
                border-radius: 18px;
            }

            .stats-grid,
            .details-grid {
                grid-template-columns: 1fr;
            }

            th,
            td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar" aria-label="Sidebar">
            <div class="brand">
                <h1 class="brand-title">ZEParts</h1>
                <p class="brand-subtitle">eBay Automation</p>
            </div>

            <div>
                <p class="nav-label">Navigation</p>
                <nav class="nav">
                    <a href="/listings" class="{% if request.url.path.startswith('/listings') %}active{% endif %}">Listings</a>
                    <a href="#" aria-disabled="true">Sync Jobs</a>
                    <a href="#" aria-disabled="true">Settings</a>
                </nav>
            </div>

            <div class="sidebar-note">
                Monitor listing health, inspect sync activity, and manually intervene when a SKU needs attention.
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <h2 class="page-title">{{ page_title }}</h2>
                    <p class="page-subtitle">ZEParts eBay listing operations dashboard</p>
                </div>
            </header>

            <section class="content">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
</body>
</html>
